name: CI

on:
  push:
    branches:
      - "master"

jobs:
  macos-check:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Syntax-check bootstrap
        run: bash -n ./.config/yadm/bootstrap

      - name: Validate Brewfile parses
        run: brew bundle list --file ./.config/yadm/Brewfile >/dev/null
