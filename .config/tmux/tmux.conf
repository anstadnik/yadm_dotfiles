################################
# Kitty-keyboard pass-through  #
################################
# Required so Ghostty + Textual TUIs (rc tx, nvim, helix, etc.) receive
# extended-key CSI-u sequences cleanly instead of partial bytes that get
# tokenised as nothing — the symptom is "single quick keystrokes randomly
# don't trigger anything in the inner program."
set -s extended-keys on
set -as terminal-features 'xterm*:extkeys'

# Don't wait half a second after ESC -- vim/nvim/helix feel sluggish otherwise.
set -sg escape-time 10

#############
# Statusbar #
#############

set -g @plugin 'catppuccin/tmux#v0.3.0'
# Flavor follows macOS appearance. Set BEFORE tpm so catppuccin reads the right value at load time.
# Re-trigger with prefix+T (binding below) when toggling appearance.
if-shell '[ "$(defaults read -g AppleInterfaceStyle 2>/dev/null)" = Dark ]' \
  "set -g @catppuccin_flavor 'mocha'" \
  "set -g @catppuccin_flavor 'latte'"
set -g @catppuccin_status_background 'default' # transparent gap between status segments
# set -g @catppuccin_window_tabs_enabled on # or off to disable window_tabs

set -g @catppuccin_powerline_icons_theme_enabled on

set -g @catppuccin_window_left_separator ""
set -g @catppuccin_window_middle_separator ""
set -g @catppuccin_window_right_separator ""
set -g @catppuccin_status_left_separator ""
set -g @catppuccin_status_right_separator ""
set -g @catppuccin_status_middle_separator ""
set -g @catppuccin_status_right_separator_inverse "no"
set -g @catppuccin_status_connect_separator "no"

set -g @catppuccin_status_modules_right "application directory session"

# set -g status-right "#{E:@catppuccin_status_application}"
# set -agF status-right "#{E:@catppuccin_status_directory}"
# set -agF status-right "#{E:@catppuccin_status_session}"

# set -g @catppuccin_l_left_separator "█"
# set -g @catppuccin_l_right_separator "█"
# set -g @catppuccin_r_left_separator "█"
# set -g @catppuccin_r_right_separator "█"

###########################
#  Change the prefix key  #
###########################

# unbind-key C-b
# set -g prefix 'M-Space'
# bind-key 'M-Space' send-prefix

set -g prefix 'C-_'
unbind C-b
bind-key 'C-_' send-prefix

# Fix for sway
# set-option -g update-environment "SWAYSOCK WAYLAND_DISPLAY KITTY_LISTEN_ON"

#########################
#  Seamless navigation  #
#########################

# Smart pane switching with awareness of Vim splits.
# See: https://github.com/christoomey/vim-tmux-navigator
is_vim="echo '#{pane_current_command}' | grep -iqE '(^|/)g?(view|n?vim?x?)(diff)?$'"
bind-key -n 'C-h' if-shell "$is_vim" 'send-keys C-h'  'select-pane -L'
bind-key -n 'C-j' if-shell "$is_vim" 'send-keys C-j'  'select-pane -D'
bind-key -n 'C-k' if-shell "$is_vim" 'send-keys C-k'  'select-pane -U'
bind-key -n 'C-l' if-shell "$is_vim" 'send-keys C-l'  'select-pane -R'
bind-key -n 'C-\' if-shell "$is_vim" 'send-keys C-\\'  'select-pane -l'

bind-key -T copy-mode-vi 'C-h' select-pane -L
bind-key -T copy-mode-vi 'C-j' select-pane -D
bind-key -T copy-mode-vi 'C-k' select-pane -U
bind-key -T copy-mode-vi 'C-l' select-pane -R
bind-key -T copy-mode-vi 'C-\' select-pane -l

############
#  Scroll  #
############

set -g mouse on

###############
#  Unlerculr  #
###############

set -as terminal-overrides ',*:Smulx=\E[4::%p1%dm'  # undercurl support
set -as terminal-overrides ',*:Setulc=\E[58::2::%p1%{65536}%/%d::%p1%{256}%/%{255}%&%d::%p1%{255}%&%d%;m'  # underscore colours - needs tmux-3.0

####################
#  Set up plugins  #
####################

# set -g @plugin 'tmux-plugins/tmux-prefix-highlight'

# Sensible options
set -g @plugin 'tmux-plugins/tmux-sensible'

set -s set-clipboard on

# bind-key -T copy-mode-vi v send-keys -X begin-selection
# bind-key -T copy-mode-vi MouseDragEnd1Pane send -X copy-pipe-and-cancel "pbcopy"
# bind-key -T copy-mode-vi y send -X copy-pipe-and-cancel "pbcopy"

set -g @plugin '27medkamal/tmux-session-wizard'

# Open urls and files using o in copy mode
# set -g @plugin 'tmux-plugins/tmux-open'
# o - "open" a highlighted selection with the system default program. open for OS X or xdg-open for Linux.
# Ctrl-o - open a highlighted selection with the $EDITOR
# Shift-s - search the highlighted selection directly inside a search engine (defaults to google).

# # Saving the session and restoring
# set -g @plugin 'tmux-plugins/tmux-resurrect'
# set -g @resurrect-strategy-nvim 'session'
# set -g @plugin 'tmux-plugins/tmux-continuum'
# set -g @continuum-restore 'on'

# Better moving between panes
set -g @plugin 'tmux-plugins/tmux-pain-control'

# fzf (<C-\> <F>)
set -g @plugin 'sainnhe/tmux-fzf'
set -g @tmux-fzf-launch-key 'f'
bind-key "S" run-shell -b "~/.config/tmux/plugins/tmux-fzf/scripts/pane.sh switch"

# Statusline
# set -g @plugin 'anstadnik/tmux-onedark-theme'
# set -g @plugin "anstadnik/nord-tmux"
# set -g @plugin 'H4ckint0sh/tmux-onedark-theme'
# setenv -g SHOW_DIRECTORY_NAME 1

set -g status-keys vi
set -g mode-keys vi

# increase scroll-back history
set -g history-limit 50000

# start window index at 1
set -g base-index 1

# start pane index at 1
setw -g pane-base-index 1

# re-number windows when one is closed
set -g renumber-windows on

# begin selection with 'v'
bind P paste-buffer
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel
bind-key -T copy-mode-vi r send-keys -X rectangle-toggle

# set -g default-terminal "xterm-kitty"
# set -as terminal-features ",xterm-kitty:RGB"
# set -as terminal-features ",tmux-256color:RGB"
# set-option -sa terminal-overrides ',xterm-kitty:RGB'
# set -ga terminal-overrides ",*256col*:Tc"
# set-option -ga terminal-overrides ",tmux-256color-italic:Tc"

############################
#  Start tmux on pc start  #
############################

# set -g @continuum-boot 'on'

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'

bind-key -T prefix l send-keys 'C-l'

# Override tmux pain control
bind-key -T prefix "|" split-window -h
bind-key -T prefix "\\" split-window -fh
bind-key -T prefix "-" split-window -v
bind-key -T prefix "_" split-window -fv

bind-key -T prefix "c" new-window

# Re-sync catppuccin flavor with current macOS appearance (light/dark).
bind-key -T prefix "T" run-shell "~/.config/tmux/scripts/sync-flavor.sh"

# Catppuccin sets status-style bg=default but leaves a stale status-bg #eff1f5 behind
# from earlier runs — force the bar background fully transparent.
set -gu status-bg
set -gu status-fg
