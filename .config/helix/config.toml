theme = "catppuccin_latte"

[editor]
line-number = "relative"
mouse = false
cursorline = true
color-modes = true

[editor.lsp]
display-inlay-hints = true

[editor.cursor-shape]
insert = "bar"
normal = "block"
select = "underline"

[editor.indent-guides]
render = true

[keys.normal]
":" = "collapse_selection"
";" = "command_mode"

[keys.insert]
j = { k = "normal_mode" }
